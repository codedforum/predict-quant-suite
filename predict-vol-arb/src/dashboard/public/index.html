<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Predict Vol-Arb | DeepBook</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { margin:0; background:#07090d; color:#e6e9ef; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { padding:14px 18px; border-bottom:1px solid #1b2030; display:flex; justify-content:space-between; align-items:center; }
  main { padding:18px; display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  .card { background:#0c1118; border:1px solid #1b2030; border-radius:8px; padding:14px; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; opacity:.7; margin:0 0 10px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid #1b2030; }
  .pos { color:#5fd49a; } .neg { color:#ff7a85; }
  canvas { width:100%; height:240px; }
</style>
</head>
<body>
<header>
  <strong>Predict Vol-Arb</strong>
  <span id="pnl" style="font-size:13px; opacity:.8">--</span>
</header>
<main>
  <div class="card"><h2>IV: Predict vs Polymarket</h2><canvas id="chart"></canvas></div>
  <div class="card"><h2>Recent Trades</h2><table id="trades"><thead><tr><th>time</th><th>side</th><th>edge</th><th>size</th></tr></thead><tbody></tbody></table></div>
</main>
<script>
async function tick() {
  const r = await fetch('/api/state').then(x => x.json());
  document.getElementById('pnl').textContent = `pnl: ${r.pnl.toFixed(2)} dUSDC`;
  drawChart(r.quotes);
  const tb = document.querySelector('#trades tbody');
  tb.innerHTML = r.trades.map(t => `<tr>
    <td>${new Date(t.ts).toISOString().slice(11,19)}</td>
    <td>${t.side}</td>
    <td>${(t.edge*100).toFixed(2)}%</td>
    <td>${t.size?.toFixed(2) ?? '-'}</td>
  </tr>`).join('');
}
function drawChart(qs) {
  const c = document.getElementById('chart');
  const ctx = c.getContext('2d');
  const w = c.width = c.clientWidth, h = c.height = 240;
  ctx.clearRect(0,0,w,h);
  if (!qs.length) return;
  const ivMax = Math.max(...qs.flatMap(q => [q.predictIv, q.polyIv].filter(Boolean)));
  const ivMin = Math.min(...qs.flatMap(q => [q.predictIv, q.polyIv].filter(Boolean)));
  const span = Math.max(0.001, ivMax - ivMin);
  const xs = qs.map((_,i) => i*(w/(qs.length-1||1)));
  const yp = (v) => h - ((v - ivMin)/span)*(h-20) - 10;
  function line(field, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.beginPath();
    qs.forEach((q,i) => { const v = q[field]; if (!Number.isFinite(v)) return; (i?ctx.lineTo:ctx.moveTo).call(ctx, xs[i], yp(v)); });
    ctx.stroke();
  }
  line('predictIv', '#5b9dff');
  line('polyIv', '#ffb454');
}
tick(); setInterval(tick, 3000);
</script>
</body>
</html>
