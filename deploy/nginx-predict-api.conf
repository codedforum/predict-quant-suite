# /etc/nginx/sites-available/predict-api.smartcodedbot.com
# After install: ln -s ../sites-available/predict-api.smartcodedbot.com /etc/nginx/sites-enabled/
# Then: certbot --nginx -d predict-api.smartcodedbot.com  (auto-issues TLS cert)
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name predict-api.smartcodedbot.com;

    # Let Certbot upgrade this block to listen 443 with TLS - keep port 80 for the ACME challenge.
    location / {
        proxy_pass http://127.0.0.1:3097;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll friendly
        proxy_buffering off;
        proxy_read_timeout 90s;
    }

    # gzip JSON
    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 256;
}
